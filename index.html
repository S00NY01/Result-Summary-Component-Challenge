<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/media.css">
    <title>Results summary component</title>
</head>

<body>
    <div class="results-summary">
        <header class="result-section">
            <p class="your-result">Your Result</p>
            <div class="result-of-100">
                <h1 class="the-result">76</h1>
                <p class="of">of 100</p>
            </div>

            <h2 class="great">Great</h2>
            <p class="scored">You scored higher than 65% of the people who have taken these tests.</p>
        </header>
        <main class="summary-section">
            <h3 class="summary">Summary</h3>
            <section class="sections reaction-section">
                <img src="./assets/images/icon-reaction.svg" alt="icon-reaction">
                <h4 class="reaction">Reaction</h4>
                <span class="score">
                    <span class="score-value">80</span><span class="score-max"> / 100</span>
                </span>
            </section>
            <section class="sections memory-section">
                <img src="./assets/images/icon-memory.svg" alt="icon-reaction">
                <h4 class="memory">Memory</h4>
                <span class="score">
                    <span class="score-value">92</span><span class="score-max"> / 100</span>
                </span>
            </section>
            <section class="sections verbal-section">
                <img src="./assets/images/icon-verbal.svg" alt="icon-reaction">
                <h4 class="verbal">Verbal</h4>
                <span class="score">
                    <span class="score-value">61</span><span class="score-max"> / 100</span>
                </span>
            </section>
            <section class="sections visual-section">
                <img src="./assets/images/icon-visual.svg" alt="icon-reaction">
                <h4 class="visual">Visual</h4>
                <span class="score">
                    <span class="score-value">73</span><span class="score-max"> / 100</span>
                </span>
            </section>
            <button class="continue-button">Continue</button>
        </main>
    </div>
</body>

</html>
